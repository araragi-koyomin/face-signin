<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FaceVault — 人脸签到系统</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="container">
  <header>
    <div class="logo">FACE<span class="logo-dot"></span>VAULT</div>
  </header>

  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:var(--space-lg);">
    <h1 class="page-title">登录</h1>
    <p class="page-subtitle">登录以管理照片库与签到记录</p>

    <div class="card">
      <div class="alert alert-error" id="error"></div>
      <div>
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="用户名" autocomplete="username" autofocus>
      </div>
      <div>
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="密码" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="loginBtn">登录</button>
    </div>

    <p class="text-center">
      <span class="link" style="cursor:pointer" onclick="location.href='/app/register'">注册账号</span>
      <span style="color:var(--text-muted);margin:0 8px">|</span>
      <a href="/app/signin" class="link">签到入口</a>
    </p>
  </div>
</div>

<script>
const API = '';
const $ = id => document.getElementById(id);

$('loginBtn').onclick = async () => {
  const el = $('error');
  el.classList.remove('show');
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = '...';

  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: $('username').value, password: $('password').value })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '登录失败');
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user_id', JSON.parse(atob(data.access_token.split('.')[1])).sub);
    location.href = '/app/dashboard';
  } catch (e) {
    el.textContent = e.message;
    el.classList.add('show');
    $('loginBtn').disabled = false;
    $('loginBtn').textContent = '登录';
  }
};

$('password').onkeydown = e => { if (e.key === 'Enter') $('loginBtn').click(); };
</script>
</body>
</html>
